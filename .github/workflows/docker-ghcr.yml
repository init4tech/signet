name: Release GHCR

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on:
      group: ${{ matrix.group }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            group: amd64-large-runners
            binary: signet
            dockerfile: Dockerfile
          - platform: linux/arm64
            group: arm64-large-runners
            binary: signet
            dockerfile: Dockerfile
          - platform: linux/amd64
            group: amd64-large-runners
            binary: signet-exex
            dockerfile: Dockerfile.exex
          - platform: linux/arm64
            group: arm64-large-runners
            binary: signet-exex
            dockerfile: Dockerfile.exex
          - platform: linux/amd64
            group: amd64-large-runners
            binary: signet-sidecar
            dockerfile: Dockerfile.sidecar
          - platform: linux/arm64
            group: arm64-large-runners
            binary: signet-sidecar
            dockerfile: Dockerfile.sidecar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          if [ "${{ matrix.binary }}" = "signet" ]; then
            echo "name=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}/${{ matrix.binary }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.binary }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.binary }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests--${{ matrix.binary }}--${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-push:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        binary: [signet, signet-exex, signet-sidecar]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests--${{ matrix.binary }}--*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          if [ "${{ matrix.binary }}" = "signet" ]; then
            echo "name=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}/${{ matrix.binary }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}
